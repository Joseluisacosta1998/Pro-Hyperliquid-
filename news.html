<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Noticias Cripto</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--bg2:#0e1018;--bg3:#13161f;--bg4:#1a1e2a;
  --green:#00e5a0;--red:#ff4466;--yellow:#f5a623;--orange:#ff7a1a;
  --text:#e2e8f4;--muted:#5a6278;--muted2:#3d4358;
  --border:#1f2435;--border2:#262c3d;
  --accent:#5b6ef5;--accent2:#7c8cf8;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'Inter',sans-serif;
}
html{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100%;
  display:flex;flex-direction:column;overscroll-behavior:none}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:8px;padding:9px 14px;position:sticky;top:0;z-index:50;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
#back-link{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);
  border-radius:8px;padding:7px 11px;cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:700;
  color:var(--text);text-decoration:none;transition:all .15s}
#back-link:hover{border-color:var(--accent2);color:var(--accent2)}
#title-block{display:flex;flex-direction:column;gap:1px;margin-right:auto}
#title-block .t1{font-family:var(--font-mono);font-size:15px;font-weight:700}
#title-block .t2{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
#offline-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:none}
#offline-dot.show{display:inline-block}
#refresh-btn{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);
  border-radius:8px;padding:7px 11px;cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:700;
  color:var(--text);transition:all .15s}
#refresh-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#refresh-btn.loading #refresh-icon{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#notif-slot{display:flex}

/* ── FILTER BAR ── */
#filterbar{display:flex;align-items:center;gap:8px;padding:9px 14px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg3)}
.chip-group{display:flex;gap:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:3px}
.f-chip{padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);
  font-family:var(--font-mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap}
.f-chip:hover{color:var(--text)}
.f-chip.active{background:rgba(91,110,245,.15);color:var(--accent2)}
#sort-select{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);
  font-family:var(--font-mono);font-size:10px;font-weight:700;padding:6px 8px;cursor:pointer;outline:none}
#asset-filter-wrap{position:relative}
#asset-filter-btn{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);
  border-radius:8px;padding:6px 10px;cursor:pointer;font-family:var(--font-mono);font-size:10px;font-weight:700;
  color:var(--text);transition:all .15s}
#asset-filter-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#asset-filter-btn.active{color:var(--accent2);border-color:var(--accent2)}
#status-line{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--muted2);white-space:nowrap}

#delete-wrap{position:relative}
#delete-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:6px 9px;
  cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s}
#delete-btn:hover{border-color:var(--red);color:var(--red)}
#delete-panel{display:none;position:absolute;top:calc(100% + 6px);right:0;width:250px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:6px;z-index:200;
  box-shadow:0 16px 40px rgba(0,0,0,.6);flex-direction:column;gap:2px}
#delete-panel.open{display:flex}
.del-opt{background:none;border:none;text-align:left;color:var(--text);font-family:var(--font-ui);
  font-size:12px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .12s;line-height:1.3}
.del-opt:hover{background:var(--bg4)}
.del-opt.danger{color:var(--red)}

/* ── POPOVER de activos ── */
#asset-panel{position:absolute;top:calc(100% + 6px);left:0;width:270px;max-height:360px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px;z-index:200;
  box-shadow:0 16px 40px rgba(0,0,0,.6);overflow:hidden;display:none;flex-direction:column}
#asset-panel.open{display:flex}
#asset-search{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;
  padding:7px 9px;color:var(--text);font-family:var(--font-ui);font-size:12px;outline:none;margin-bottom:8px}
#asset-search:focus{border-color:var(--accent2)}
#asset-list{overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.asset-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .12s}
.asset-row:hover{background:var(--bg4)}
.asset-row.selected{background:rgba(91,110,245,.15)}
.asset-row .a-ticker{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--text);width:52px}
.asset-row .a-count{font-family:var(--font-mono);font-size:9px;color:var(--muted);flex:1}
.asset-row .a-star{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted2);padding:2px 4px;transition:color .12s}
.asset-row .a-star.on{color:var(--yellow)}
.asset-panel-note{font-size:9px;color:var(--muted);line-height:1.4;padding:8px 4px 2px;border-top:1px solid var(--border);margin-top:6px}

/* ── LISTA DE NOTICIAS ── */
#news-wrap{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;max-width:760px;margin:0 auto;width:100%}
.news-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;
  display:flex;flex-direction:column;gap:7px;transition:border-color .3s, background .3s}
.news-card.is-new{border-color:rgba(91,110,245,.55);background:rgba(91,110,245,.05)}
.news-card.is-priority{border-left:3px solid var(--yellow)}
.nc-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nc-source{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--accent2);
  background:rgba(91,110,245,.12);border-radius:5px;padding:2px 7px}
.nc-source.dex{color:var(--green);background:rgba(0,229,160,.12)}
.nc-source.company{color:#b48cff;background:rgba(180,140,255,.12)}
.nc-badge{font-family:var(--font-mono);font-size:9px;font-weight:700;border-radius:5px;padding:2px 7px;
  display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.nc-badge.up{color:var(--green);background:rgba(0,229,160,.12)}
.nc-badge.down{color:var(--red);background:rgba(255,68,102,.12)}
.nc-badge.neutral{color:var(--yellow);background:rgba(245,166,35,.12)}
.nc-badge.impact-alto{color:var(--orange);background:rgba(255,122,26,.14)}
.nc-badge.impact-medio{color:var(--yellow);background:rgba(245,166,35,.12)}
.nc-badge.impact-bajo{color:var(--muted);background:rgba(90,98,120,.15)}
.nc-badge.missed{color:var(--accent2);background:rgba(124,140,248,.14)}
.nc-new-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;color:#fff;background:var(--accent);
  border-radius:5px;padding:2px 7px}
.nc-assets{display:flex;gap:4px;flex-wrap:wrap}
.nc-asset-chip{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--muted);
  background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:1px 6px;cursor:pointer}
.nc-asset-chip:hover{color:var(--text);border-color:var(--accent2)}
.nc-asset-chip.priority{color:var(--yellow);border-color:rgba(245,166,35,.4)}
.nc-time{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--muted);white-space:nowrap}
.nc-title{font-family:var(--font-ui);font-size:14.5px;font-weight:600;line-height:1.4;color:var(--text);
  text-decoration:none}
.nc-title:hover{color:var(--accent2)}
.nc-original{font-family:var(--font-ui);font-size:11.5px;color:var(--muted);line-height:1.4;font-style:italic}
.nc-bottom{display:flex;align-items:center;gap:10px}
.nc-link{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--accent2);text-decoration:none}
.nc-link:hover{text-decoration:underline}
.nc-toggle-orig{font-family:var(--font-mono);font-size:9px;color:var(--muted);background:none;border:none;
  cursor:pointer;text-decoration:underline}

#empty-state,#loading-state{text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--font-mono);font-size:12px}
#loading-state .spin{display:inline-block;animation:spin .8s linear infinite;margin-bottom:8px;font-size:20px}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);z-index:400;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;
  font-family:var(--font-mono);font-size:11px;color:var(--text);opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="topbar">
  <a id="back-link" href="index.html">← Gráficos</a>
  <div id="title-block">
    <span class="t1">📰 Noticias Cripto</span>
    <span class="t2"><span id="offline-dot"></span><span id="status-sub">Cargando…</span></span>
  </div>
  <button id="refresh-btn" title="Actualizar noticias">
    <span id="refresh-icon">&#x21bb;</span><span>Actualizar</span>
  </button>
  <div id="notif-slot"></div>
</div>

<div id="filterbar">
  <div class="chip-group" id="sent-filters">
    <button class="f-chip active" data-f="all">Todas</button>
    <button class="f-chip" data-f="up">🟢 Alcistas</button>
    <button class="f-chip" data-f="down">🔴 Bajistas</button>
    <button class="f-chip" data-f="alto">🔥 Alto impacto</button>
    <button class="f-chip" data-f="priority">⭐ Prioridad</button>
  </div>
  <div id="asset-filter-wrap">
    <button id="asset-filter-btn">🪙 Activos <span id="asset-filter-label"></span><span style="opacity:.6">▾</span></button>
    <div id="asset-panel">
      <input id="asset-search" type="text" placeholder="Buscar activo (BTC, ETH…)"/>
      <div id="asset-list"></div>
      <div class="asset-panel-note">Toca un activo para filtrar por él. La ★ lo marca como prioridad: sus noticias se destacan y suben en el orden por relevancia.</div>
    </div>
  </div>
  <select id="sort-select">
    <option value="relevancia">Ordenar: relevancia</option>
    <option value="recientes">Ordenar: más recientes</option>
  </select>
  <div id="delete-wrap">
    <button id="delete-btn" title="Eliminar noticias guardadas">🗑</button>
    <div id="delete-panel">
      <button class="del-opt" data-mode="filtered">Eliminar solo las que coinciden con el filtro actual</button>
      <button class="del-opt" data-mode="24h">Eliminar las de hace más de 24 horas</button>
      <button class="del-opt" data-mode="3d">Eliminar las de hace más de 3 días</button>
      <button class="del-opt" data-mode="7d">Eliminar las de hace más de 7 días</button>
      <button class="del-opt danger" data-mode="all">Eliminar TODAS las noticias guardadas</button>
    </div>
  </div>
  <span id="status-line"></span>
</div>

<div id="news-wrap">
  <div id="loading-state"><div class="spin">◐</div><div>Cargando noticias de las principales fuentes cripto…</div></div>
  <div id="news-list" style="display:flex;flex-direction:column;gap:10px;"></div>
  <div id="empty-state" style="display:none">No hay noticias que coincidan con este filtro.</div>
</div>

<div id="toast"></div>

<script src="notif.js"></script>
<script>
'use strict';

// ¿Estamos embebidos dentro de index.html (iframe) o abiertos como página suelta?
const EMBED = (window.parent && window.parent !== window);
if(EMBED){
  // Embebido: el botón "← Gráficos" no debe navegar el iframe, sino pedirle
  // al shell que cambie de vista (los gráficos siguen cargados detrás).
  document.getElementById('back-link').addEventListener('click', e=>{
    e.preventDefault();
    window.parent.postMessage({type:'hlchart-view', view:'charts'}, '*');
  });
}

// ─── FUENTES RSS ───────────────────────────────────────────────────────────
// Para añadir/quitar una fuente, solo edita esta lista (name = como se
// muestra, url = feed RSS/Atom público, category:'dex'|'company' = fuente
// oficial de un exchange descentralizado o de una empresa, se marca distinto).
const FEEDS = [
  {name:'CoinDesk',        url:'https://www.coindesk.com/arc/outboundfeeds/rss/'},
  {name:'Cointelegraph',   url:'https://cointelegraph.com/rss'},
  {name:'Decrypt',         url:'https://decrypt.co/feed'},
  {name:'CryptoSlate',     url:'https://cryptoslate.com/feed/'},
  {name:'Bitcoin Magazine',url:'https://bitcoinmagazine.com/feed'},
  {name:'NewsBTC',         url:'https://www.newsbtc.com/feed/'},
  {name:'Bitcoinist',      url:'https://bitcoinist.com/feed/'},
  {name:'U.Today',         url:'https://u.today/rss'},
  {name:'CryptoPotato',    url:'https://cryptopotato.com/feed/'},
  {name:'The Defiant',     url:'https://thedefiant.io/feed'},
  // Blogs oficiales de exchanges descentralizados (DEX). Si alguno deja de
  // responder (cambian de plataforma de blog con frecuencia), basta con
  // corregir la URL aquí; el resto de la app no necesita tocarse.
  {name:'Uniswap',      url:'https://blog.uniswap.org/rss/',      category:'dex'},
  {name:'Curve Finance',url:'https://news.curve.finance/rss',      category:'dex'},
  {name:'PancakeSwap',  url:'https://blog.pancakeswap.finance/rss',category:'dex'},
  {name:'dYdX',         url:'https://medium.com/feed/dydxderivatives', category:'dex'},
  {name:'GMX',          url:'https://medium.com/feed/@gmx.io',        category:'dex'},
  {name:'1inch',        url:'https://medium.com/feed/1inch-network',  category:'dex'},
  {name:'Osmosis',      url:'https://blog.osmosis.zone/rss/',      category:'dex'},
  // Blogs oficiales de grandes empresas cripto. Nota: Hyperliquid, Aster,
  // Lighter y Pacifica NO tienen un blog RSS público (publican casi todo por
  // X/Twitter, que ya no ofrece RSS sin API de pago) — por eso no están aquí;
  // en cambio, están en ENTITY_MAP más abajo para detectarse y filtrarse
  // cuando OTRA fuente los mencione.
  {name:'Coinbase',  url:'https://www.coinbase.com/blog/rss',   category:'company'},
  {name:'Kraken',    url:'https://blog.kraken.com/feed',        category:'company'},
  {name:'Ripple',    url:'https://ripple.com/insights/feed/',   category:'company'},
  {name:'Circle',    url:'https://www.circle.com/blog/rss.xml', category:'company'},
];

// ─── PROXIES CORS (los RSS no traen cabeceras CORS, así que hace falta uno) ─
const CORS_PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u,
];
async function fetchWithProxies(url, timeoutMs){
  timeoutMs = timeoutMs || 15000;
  let lastErr;
  for(const build of CORS_PROXIES){
    try{
      const ctrl = ('AbortController' in window) ? new AbortController() : null;
      const t = ctrl ? setTimeout(()=>ctrl.abort(), timeoutMs) : null;
      const r = await fetch(build(url), {signal: ctrl?ctrl.signal:undefined});
      if(t) clearTimeout(t);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const text = await r.text();
      if(!text || text.length<50) throw new Error('respuesta vacía');
      return text;
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('todos los proxies fallaron');
}
function makeQueue(maxConcurrent){
  let active=0; const q=[];
  function pump(){ while(active<maxConcurrent && q.length){ const job=q.shift(); active++; job().finally(()=>{active--; pump();}); } }
  return fn => new Promise((resolve,reject)=>{ q.push(()=>fn().then(resolve,reject)); pump(); });
}
const queueFeed = makeQueue(3);
const queueTranslate = makeQueue(3);

// ─── PARSEO RSS/ATOM ────────────────────────────────────────────────────────
function stripHtml(s){ return (s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim(); }
function parseFeedXML(xmlText, feed){
  const items=[];
  try{
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    if(doc.querySelector('parsererror')) return items;
    const nodes = doc.querySelectorAll('item, entry');
    nodes.forEach(node=>{
      const title = stripHtml(node.querySelector('title')?.textContent || '');
      let link = '';
      const linkNodes = node.querySelectorAll('link');
      linkNodes.forEach(l=>{
        if(link) return;
        const href = l.getAttribute('href');
        if(href && (!l.getAttribute('rel') || l.getAttribute('rel')==='alternate')) link=href;
        else if(!href && l.textContent) link=l.textContent.trim();
      });
      const dateStr = node.querySelector('pubDate')?.textContent
        || node.querySelector('published')?.textContent
        || node.querySelector('updated')?.textContent || '';
      const date = dateStr ? new Date(dateStr) : new Date();
      const desc = stripHtml(node.querySelector('description')?.textContent
        || node.querySelector('summary')?.textContent
        || node.querySelector('content')?.textContent || '');
      if(title && link){
        items.push({
          title, link, date: isNaN(date.getTime())?new Date():date, desc:desc.slice(0,280),
          source:feed.name, category: feed.category || 'news'
        });
      }
    });
  }catch(e){}
  return items;
}
async function loadAllFeeds(){
  const settled = await Promise.allSettled(
    FEEDS.map(f => queueFeed(()=>fetchWithProxies(f.url).then(xml=>parseFeedXML(xml, f))))
  );
  let all=[], failedSources=[];
  settled.forEach((r,i)=>{
    if(r.status==='fulfilled' && r.value.length) all = all.concat(r.value);
    else failedSources.push(FEEDS[i].name);
  });
  return {items:all, failedSources};
}

// ─── TRADUCCIÓN AL ESPAÑOL (varios proveedores, con caché y reintento) ─────
// MyMemory (gratis) tiene una cuota diaria baja; cuando se agota o falla,
// probamos con Lingva (varios espejos públicos de Google Translate). Si TODO
// falla, devolvemos el texto original marcado como "no traducido" para que
// se reintente en el próximo ciclo de actualización en vez de quedar en
// inglés para siempre.
let trCache = {};
try{ trCache = JSON.parse(localStorage.getItem('hlchart:news:trcache')||'{}'); }catch(e){}
function saveTrCache(){
  try{
    const keys=Object.keys(trCache);
    if(keys.length>700){ keys.slice(0, keys.length-700).forEach(k=>delete trCache[k]); }
    localStorage.setItem('hlchart:news:trcache', JSON.stringify(trCache));
  }catch(e){}
}
async function translateViaMyMemory(text){
  const url = 'https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.slice(0,480))+'&langpair=en|es';
  const ctrl = ('AbortController' in window) ? new AbortController() : null;
  const t = ctrl ? setTimeout(()=>ctrl.abort(), 9000) : null;
  const r = await fetch(url, {signal: ctrl?ctrl.signal:undefined});
  if(t) clearTimeout(t);
  const d = await r.json();
  const translated = d && d.responseData && d.responseData.translatedText;
  if(translated && !/MYMEMORY WARNING/i.test(translated) && !/QUOTA/i.test(translated)) return translated;
  throw new Error('MyMemory sin cuota o sin traducción');
}
async function translateViaLingva(text, host){
  const url = 'https://'+host+'/api/v1/en/es/'+encodeURIComponent(text.slice(0,480));
  const ctrl = ('AbortController' in window) ? new AbortController() : null;
  const t = ctrl ? setTimeout(()=>ctrl.abort(), 9000) : null;
  const r = await fetch(url, {signal: ctrl?ctrl.signal:undefined});
  if(t) clearTimeout(t);
  if(!r.ok) throw new Error('Lingva ('+host+') HTTP '+r.status);
  const d = await r.json();
  if(d && d.translation) return d.translation;
  throw new Error('Lingva ('+host+') sin traducción');
}
const TRANSLATE_PROVIDERS = [
  text => translateViaMyMemory(text),
  text => translateViaLingva(text, 'lingva.ml'),
  text => translateViaLingva(text, 'lingva.garudalinux.org'),
  text => translateViaLingva(text, 'translate.plausibility.cloud'),
];
async function translateToEs(text){
  if(!text) return {text:'', ok:true};
  const key = text.slice(0,200);
  if(trCache[key]) return {text:trCache[key], ok:true};
  for(const provider of TRANSLATE_PROVIDERS){
    try{
      const translated = await provider(text);
      if(translated && translated.trim() && translated.trim().toLowerCase()!==text.trim().toLowerCase()){
        trCache[key]=translated; saveTrCache();
        return {text:translated, ok:true};
      }
    }catch(e){ /* probamos el siguiente proveedor */ }
  }
  return {text, ok:false}; // no se pudo traducir esta vez: se reintentará en el próximo ciclo
}

// ─── CLASIFICACIÓN (alcista/bajista + impacto) ─────────────────────────────
const BULLISH_WORDS = ['surge','surges','rally','rallies','soar','soars','jump','jumps','gain','gains',
  'record high','all-time high','all time high',' ath ','breakout','adopt','adoption','approve','approved',
  'approval','bullish','inflow','inflows','partnership','launch','launches','launched','integrate','integrates',
  'integration','upgrade','expands','expansion','outperform','rebound','recovery','recovers','milestone',
  'institutional','invest','investment','invests','greenlight','boom','skyrocket','climbs','climb','rises',
  'rise','risen','soaring','breakthrough','surpasses','surpass'];
const BEARISH_WORDS = ['crash','crashes','plunge','plunges','dump','dumps','sell-off','selloff','hack','hacked',
  'exploit','exploited','breach','stolen','theft','lawsuit','sues','sued','charges','charged','fraud','scam',
  'ban','banned','bans','restrict','restriction','delist','delisting','collapse','bankrupt','bankruptcy',
  'insolvency','liquidation','liquidated','outflow','outflows','decline','declines','drop','drops','falls',
  'fall','fell','tumbles','tumble','warns','warning','concerns','bearish','investigation','probe','seize',
  'seized','freeze','frozen','halts','halted','suspends','suspended','slump','sinks'];
const HIGH_IMPACT_WORDS = ['sec ','sec,','sec.','etf','fed ','federal reserve','interest rate','regulation',
  'regulatory','congress','senate','lawsuit','hack','hacked','billion','halving','cpi','inflation','bankruptcy',
  'cftc','executive order','ban','approval','approved','blackrock','stablecoin','depeg','systemic','emergency',
  'exploit','breach','white house','treasury','imf','g7','trump','biden'];
function classify(title, desc, category){
  const text = ' '+(title+' '+(desc||'')).toLowerCase()+' ';
  let bull=0, bear=0, impact=0;
  BULLISH_WORDS.forEach(w=>{ if(text.includes(w)) bull++; });
  BEARISH_WORDS.forEach(w=>{ if(text.includes(w)) bear++; });
  HIGH_IMPACT_WORDS.forEach(w=>{ if(text.includes(w)) impact++; });
  let sentiment='neutral';
  if(bull>bear) sentiment='up'; else if(bear>bull) sentiment='down';
  // Los anuncios oficiales de un DEX o de una empresa (lanzamientos,
  // integraciones, resultados, hackeos...) se consideran de partida un poco
  // más relevantes: vienen directamente de la fuente involucrada.
  const isOfficial = category==='dex' || category==='company';
  let impactScore = impact*1.4 + Math.max(bull,bear)*0.6 + (isOfficial?0.8:0);
  let impactLevel='bajo';
  if(impactScore>=3) impactLevel='alto';
  else if(impactScore>=1.4) impactLevel='medio';
  return {sentiment, impactLevel, impactScore};
}

// ─── UNIVERSO DE ACTIVOS DE HYPERLIQUID (el mismo que usan los gráficos) ───
// Hyperliquid expone su API con CORS abierto, así que se puede llamar directo
// sin pasar por un proxy (igual que hace chart-panel.html). Se cachea unas
// horas para no pedirlo en cada actualización de noticias.
const HL_API = 'https://api.hyperliquid.xyz/info';
const HL_ASSETS_KEY = 'hlchart:news:hlAssets:v2';
const HL_ASSETS_TTL = 6*60*60*1000; // 6 horas
let HL_ASSETS = [];
try{
  const cached = JSON.parse(localStorage.getItem(HL_ASSETS_KEY)||'null');
  if(cached && Array.isArray(cached.list)) HL_ASSETS = cached.list;
}catch(e){}

function buildAssetIndex(){
  const known = new Set(ASSET_MAP_RAW.map(([t])=>t.toUpperCase()));
  // Añadimos cualquier activo del universo de Hyperliquid (los mismos que ves
  // en el selector de "BTC-PERP" de los gráficos) que no esté ya en la lista
  // curada de arriba, para poder buscar/filtrar por CUALQUIERA de ellos.
  const extra = HL_ASSETS
    .map(t=>String(t||'').toUpperCase())
    .filter(t=>t && !known.has(t));
  const extraUnique = Array.from(new Set(extra));
  const merged = ASSET_MAP_RAW.concat(extraUnique.map(t=>[t, []]));
  return merged.map(([ticker,aliases])=>({
    ticker, aliases,
    re: new RegExp('\\b'+ticker.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i')
  }));
}
let ASSET_MAP = buildAssetIndex();

async function loadHLAssets(){
  try{
    const cached = JSON.parse(localStorage.getItem(HL_ASSETS_KEY)||'null');
    if(cached && Array.isArray(cached.list) && cached.list.length && (Date.now()-cached.time)<HL_ASSETS_TTL){
      return; // caché reciente, no hace falta pedirlo de nuevo
    }
  }catch(e){}
  for(let attempt=0; attempt<2; attempt++){
    try{
      const ctrl = ('AbortController' in window) ? new AbortController() : null;
      const t = ctrl ? setTimeout(()=>ctrl.abort(), 30000) : null; // payload grande: timeout generoso
      // allPerpMetas trae TODOS los sub-mercados a la vez: el listado principal
      // de cripto (BTC, ETH…) y los HIP-3 de acciones/índices tokenizados
      // (TSLA, NVDA, SPX500, HOOD…), que viven aparte con nombre "dex:TICKER".
      const r = await fetch(HL_API, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({type:'allPerpMetas'}), signal: ctrl?ctrl.signal:undefined});
      if(t) clearTimeout(t);
      const d = await r.json();
      const names=[];
      (d||[]).forEach(pair=>{
        const meta = pair && pair[0] && pair[0].universe || [];
        meta.forEach(m=>{
          if(!m || !m.name) return;
          const i = m.name.indexOf(':');
          names.push(i>=0 ? m.name.slice(i+1) : m.name); // sin el prefijo del sub-dex
        });
      });
      const list = Array.from(new Set(names.filter(Boolean)));
      if(!list.length) throw new Error('universo vacío');
      HL_ASSETS = list;
      try{ localStorage.setItem(HL_ASSETS_KEY, JSON.stringify({time:Date.now(), list})); }catch(e){}
      ASSET_MAP = buildAssetIndex();
      return;
    }catch(e){
      if(attempt===0) await new Promise(res=>setTimeout(res,1500));
      /* si falla también el reintento, seguimos con lo que hubiera en caché (o la lista curada) */
    }
  }
}

// Empresas, personas y exchanges sin RSS propio: se detectan solo por frase
// completa (no por una palabra suelta como "circle" o "strategy", que darían
// muchos falsos positivos). Así, cuando cualquier fuente los mencione, la
// noticia queda etiquetada y se puede filtrar/priorizar igual que un activo.
const ENTITY_MAP = [
  ['Saylor/Strategy', ['michael saylor','microstrategy','strategy inc','strategy world']],
  ['Coinbase', ['coinbase']],
  ['Binance',  ['binance', 'changpeng zhao']],
  ['Kraken',   ['kraken exchange','kraken.com']],
  ['Circle',   ['circle internet','usdc issuer circle']],
  ['Tether',   ['tether limited','tether usdt','usdt issuer']],
  ['Ripple',   ['ripple labs','ripple ceo','ripple ceo brad garlinghouse']],
  ['Grayscale',['grayscale investments']],
  ['BlackRock',['blackrock']],
  ['Galaxy Digital',['galaxy digital']],
  ['Robinhood',['robinhood crypto','robinhood markets']],
  ['Hyperliquid',['hyperliquid']],
  ['Aster',    ['aster dex','asterdex']],
  ['Lighter',  ['lighter exchange','lighter.xyz']],
  ['Pacifica', ['pacifica finance','pacifica.fi']],
];
function detectAssets(title, desc){
  const full = title+' '+(desc||'');
  const lower = ' '+full.toLowerCase()+' ';
  const found=[];
  for(const a of ASSET_MAP){
    if(a.re.test(full) || a.aliases.some(al=>lower.includes(al))) found.push(a.ticker);
  }
  for(const [name, aliases] of ENTITY_MAP){
    if(aliases.some(al=>lower.includes(al)) && !found.includes(name)) found.push(name);
  }
  return found.slice(0,6);
}

function timeAgo(date){
  const diffMin = Math.max(0, Math.round((Date.now()-date.getTime())/60000));
  if(diffMin<1) return 'ahora mismo';
  if(diffMin<60) return 'hace '+diffMin+' min';
  const h = Math.floor(diffMin/60);
  if(h<24) return 'hace '+h+'h';
  const d = Math.floor(h/24);
  return 'hace '+d+'d';
}
function fmtClock(date){
  const pad2=n=>String(n).padStart(2,'0');
  return pad2(date.getHours())+':'+pad2(date.getMinutes());
}

// ─── PIPELINE PRINCIPAL ─────────────────────────────────────────────────────
async function refreshNews(manual){
  const btn=document.getElementById('refresh-btn');
  const statusSub=document.getElementById('status-sub');
  const statusLine=document.getElementById('status-line');
  btn.classList.add('loading');
  statusSub.textContent='Actualizando…';
  try{
    const {items:raw, failedSources} = await loadAllFeeds();
    const byLink = new Map();
    raw.forEach(it=>{ if(!byLink.has(it.link)) byLink.set(it.link, it); });
    const existingByLink = new Map(items.map(it=>[it.link, it]));

    const lastCheckAt = parseInt(localStorage.getItem(LASTCHECK_KEY)||'0',10) || 0;
    const now = Date.now();

    const newOnes=[]; const missedOnes=[];
    for(const it of byLink.values()){
      if(existingByLink.has(it.link)) continue; // ya lo teníamos, no es nuevo
      const c = classify(it.title, it.desc, it.category);
      it.sentiment=c.sentiment; it.impactLevel=c.impactLevel; it.impactScore=c.impactScore;
      it.assets = detectAssets(it.title, it.desc);
      it.missed = !firstEverRun && lastCheckAt>0 && it.date.getTime() < (lastCheckAt - 2*60*1000);
      newOnes.push(it);
      if(it.missed) missedOnes.push(it);
    }

    // Traducir lo nuevo (lo ya existente ya tiene su traducción guardada)
    await Promise.all(newOnes.map(it => queueTranslate(async ()=>{
      const res = await translateToEs(it.title);
      it.titleEs = res.text;
      it.trFailed = !res.ok;
    })));

    // Fusionar con el historial persistido y recortar
    const merged = newOnes.concat(items);
    merged.sort((a,b)=>b.date-a.date);
    items = merged.slice(0, MAX_STORE);

    // Reintentar traducción de noticias que fallaron en ciclos anteriores
    // (así ninguna se queda en inglés para siempre por una falla puntual).
    const retryBatch = items.filter(it=>it.trFailed).slice(0,15);
    if(retryBatch.length){
      await Promise.all(retryBatch.map(it => queueTranslate(async ()=>{
        const res = await translateToEs(it.title);
        if(res.ok){ it.titleEs=res.text; it.trFailed=false; }
      })));
    }
    saveStore();
    localStorage.setItem(LASTCHECK_KEY, String(now));

    if(newOnes.length) flagNew(newOnes);
    render();
    refreshAssetPanel();

    const nowD=new Date();
    statusSub.textContent = 'Actualizado '+fmtClock(nowD)+(failedSources.length?(' · '+failedSources.length+' fuente(s) sin respuesta'):'');
    statusLine.textContent = items.length+' noticias guardadas · próxima actualización en 3 min';
    document.getElementById('offline-dot').classList.remove('show');

    if(!firstEverRun && newOnes.length){
      const top = newOnes.slice().sort((a,b)=>b.impactScore-a.impactScore)[0];
      const normalCount = newOnes.length - missedOnes.length;
      HLNotif.bumpUnread(newOnes.length);
      let label;
      if(missedOnes.length && normalCount) label = '📰 '+normalCount+' nuevas + 📬 '+missedOnes.length+' mientras no estabas';
      else if(missedOnes.length) label = '📬 '+missedOnes.length+' noticias mientras no estabas conectado';
      else label = newOnes.length===1 ? '📰 1 noticia nueva' : '📰 '+newOnes.length+' noticias nuevas';
      HLNotif.notify(label, (top.titleEs||top.title), ()=>{ window.open(top.link, '_blank'); });
      showToast(label);
      if(EMBED){
        window.parent.postMessage({type:'hlchart-news-alert', newCount:newOnes.length, missedCount:missedOnes.length,
          top:{title:top.title, titleEs:(top.titleEs||top.title), link:top.link}}, '*');
      }
    }
    firstEverRun = false;
  }catch(e){
    statusSub.textContent = navigator.onLine===false ? 'Sin conexión — reintentando…' : 'Error al actualizar. Reintentando…';
    document.getElementById('offline-dot').classList.toggle('show', navigator.onLine===false);
    setTimeout(()=>refreshNews(false), 20000);
  }finally{
    btn.classList.remove('loading');
    document.getElementById('loading-state').style.display='none';
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}
function flagNew(newOnes){
  newOnes.forEach(it=>{ it._justArrived=true; });
  setTimeout(()=>{ newOnes.forEach(it=>{ it._justArrived=false; }); render(); }, 60000);
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
const SENT_LABEL = {up:'🟢 Alcista', down:'🔴 Bajista', neutral:'🟡 Neutral'};
const IMPACT_LABEL = {alto:'🔥 Alto impacto', medio:'⚡ Impacto medio', bajo:'Impacto bajo'};

function scoreForSort(it){
  const impactWeight = it.impactLevel==='alto'?3:(it.impactLevel==='medio'?2:1);
  const hoursOld = (Date.now()-it.date.getTime())/3600000;
  let score = impactWeight*10 - Math.min(hoursOld,24)*0.4;
  if(it.assets && it.assets.some(a=>priorityAssets.includes(a))) score += 15;
  return score;
}
function getFilteredItems(){
  return items.filter(it=>{
    if(currentFilter==='up' && it.sentiment!=='up') return false;
    if(currentFilter==='down' && it.sentiment!=='down') return false;
    if(currentFilter==='alto' && it.impactLevel!=='alto') return false;
    if(currentFilter==='priority' && !(it.assets||[]).some(a=>priorityAssets.includes(a))) return false;
    if(currentAssetFilter && !(it.assets||[]).includes(currentAssetFilter)) return false;
    return true;
  });
}
function render(){
  const list=document.getElementById('news-list');
  const empty=document.getElementById('empty-state');
  let filtered = getFilteredItems();
  if(currentSort==='recientes') filtered.sort((a,b)=>b.date-a.date);
  else filtered.sort((a,b)=>scoreForSort(b)-scoreForSort(a));
  filtered = filtered.slice(0,200); // no pintamos de golpe las 500 guardadas

  if(!filtered.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  list.innerHTML = filtered.map(it=>{
    const isPriority = (it.assets||[]).some(a=>priorityAssets.includes(a));
    return '<div class="news-card'+(it._justArrived?' is-new':'')+(isPriority?' is-priority':'')+'">'
      +'<div class="nc-top">'
        +'<span class="nc-source'+(it.category==='dex'?' dex':it.category==='company'?' company':'')+'">'+esc(it.source)+(it.category==='dex'?' · DEX oficial':it.category==='company'?' · Empresa oficial':'')+'</span>'
        +'<span class="nc-badge '+it.sentiment+'">'+SENT_LABEL[it.sentiment]+'</span>'
        +'<span class="nc-badge impact-'+it.impactLevel+'">'+IMPACT_LABEL[it.impactLevel]+'</span>'
        +(it.missed?'<span class="nc-badge missed">⏱️ Mientras no estabas</span>':'')
        +(it.trFailed?'<span class="nc-badge missed" title="No se pudo traducir todavía, se reintentará solo">🔄 traduciendo</span>':'')
        +(it._justArrived?'<span class="nc-new-tag">NUEVO</span>':'')
        +'<span class="nc-time">'+timeAgo(it.date)+' · '+fmtClock(it.date)+'</span>'
      +'</div>'
      +'<a class="nc-title" href="'+esc(it.link)+'" target="_blank" rel="noopener">'+esc(it.titleEs||it.title)+'</a>'
      +(it.assets && it.assets.length ? '<div class="nc-assets">'+it.assets.map(a=>
          '<button class="nc-asset-chip'+(priorityAssets.includes(a)?' priority':'')+'" data-asset="'+esc(a)+'">'
          +(priorityAssets.includes(a)?'★ ':'')+esc(a)+'</button>').join('') +'</div>' : '')
      +'<div class="nc-bottom">'
        +'<a class="nc-link" href="'+esc(it.link)+'" target="_blank" rel="noopener">Ver fuente ↗</a>'
        +'<button class="nc-toggle-orig" data-link="'+esc(it.link)+'">ver original</button>'
      +'</div>'
      +'<div class="nc-original" data-orig-for="'+esc(it.link)+'" style="display:none">'+esc(it.title)+'</div>'
    +'</div>';
  }).join('');

  list.querySelectorAll('.nc-toggle-orig').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const el = list.querySelector('[data-orig-for="'+CSS.escape(btn.dataset.link)+'"]');
      if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
    });
  });
  list.querySelectorAll('.nc-asset-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentAssetFilter = btn.dataset.asset;
      updateAssetFilterLabel();
      render();
    });
  });
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ─── ELIMINAR NOTICIAS GUARDADAS ────────────────────────────────────────────
function deleteNews(mode){
  let removed=0;
  if(mode==='all'){
    removed = items.length;
    items = [];
  } else if(mode==='24h' || mode==='3d' || mode==='7d'){
    const days = mode==='24h'?1:(mode==='3d'?3:7);
    const cutoff = Date.now() - days*24*60*60*1000;
    const before = items.length;
    items = items.filter(it=>it.date.getTime()>=cutoff);
    removed = before - items.length;
  } else if(mode==='filtered'){
    const toRemove = new Set(getFilteredItems().map(it=>it.link));
    const before = items.length;
    items = items.filter(it=>!toRemove.has(it.link));
    removed = before - items.length;
  }
  saveStore();
  render();
  refreshAssetPanel(document.getElementById('asset-search').value);
  showToast(removed ? ('🗑️ '+removed+' noticia'+(removed===1?'':'s')+' eliminada'+(removed===1?'':'s')) : 'No había nada que borrar con ese criterio.');
}
const MODE_LABELS = {
  all:'¿Eliminar TODAS las noticias guardadas? Esta acción no se puede deshacer.',
  '24h':'¿Eliminar las noticias de hace más de 24 horas?',
  '3d':'¿Eliminar las noticias de hace más de 3 días?',
  '7d':'¿Eliminar las noticias de hace más de 7 días?',
  filtered:'¿Eliminar todas las noticias que coinciden con el filtro/activo actual?',
};
document.getElementById('delete-btn').addEventListener('click', e=>{

  document.getElementById('delete-panel').classList.toggle('open');
});

});

    document.getElementById('delete-panel').classList.remove('open');

  const counts={};
  items.forEach(it=>(it.assets||[]).forEach(a=>counts[a]=(counts[a]||0)+1));
  // Universo completo: todos los tickers conocidos (incluye el universo entero
  // de Hyperliquid una vez cargado) + empresas/DEX sin ticker, aunque todavía
  // no tengan ninguna noticia (cuenta 0) — así se puede buscar cualquier activo.
  const allNames = Array.from(new Set(
    ASSET_MAP.map(a=>a.ticker).concat(ENTITY_MAP.map(([name])=>name))
  ));
  let tickers = allNames.sort((a,b)=>(counts[b]||0)-(counts[a]||0) || a.localeCompare(b));
  if(filterText) tickers = tickers.filter(t=>t.toLowerCase().includes(filterText.toLowerCase()));
  const list=document.getElementById('asset-list');
  if(!tickers.length){
    list.innerHTML='<div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);padding:10px 4px;text-align:center">Sin resultados.</div>';
    return;
  }
  list.innerHTML =
    '<div class="asset-row" data-clear="1"><span class="a-ticker">Todos</span><span class="a-count">quitar filtro</span></div>'
    + tickers.map(t=>
      '<div class="asset-row'+(currentAssetFilter===t?' selected':'')+'" data-asset="'+esc(t)+'">'
      +'<span class="a-ticker">'+esc(t)+'</span><span class="a-count">'+(counts[t]||0)+' noticias</span>'
      +'<button class="a-star'+(priorityAssets.includes(t)?' on':'')+'" data-star="'+esc(t)+'" title="Marcar como prioridad">★</button>'
      +'</div>'
    ).join('');
  list.querySelectorAll('.asset-row[data-asset]').forEach(row=>{
    row.addEventListener('click', e=>{
      if(e.target.closest('.a-star')) return;
      currentAssetFilter = row.dataset.asset;
      updateAssetFilterLabel();
      document.getElementById('asset-panel').classList.remove('open');
      render();
    });
  });
  list.querySelectorAll('.a-star').forEach(star=>{
    star.addEventListener('click', e=>{
      e.stopPropagation();
      const t = star.dataset.star;
      if(priorityAssets.includes(t)) priorityAssets = priorityAssets.filter(x=>x!==t);
      else priorityAssets.push(t);
      savePriority();
      refreshAssetPanel(document.getElementById('asset-search').value);
      render();
    });
  });
  const clearRow = list.querySelector('[data-clear]');
  if(clearRow) clearRow.addEventListener('click', ()=>{
    currentAssetFilter=null; updateAssetFilterLabel();
    document.getElementById('asset-panel').classList.remove('open');
    render();
  });
}
document.getElementById('asset-filter-btn').addEventListener('click', e=>{
  e.stopPropagation();
  document.getElementById('asset-panel').classList.toggle('open');
});
document.addEventListener('click', e=>{
  if(!e.target.closest('#asset-filter-wrap')) document.getElementById('asset-panel').classList.remove('open');
});
document.getElementById('asset-search').addEventListener('input', e=>refreshAssetPanel(e.target.value));

// ─── NOTIFICACIONES (campana compartida) + badge de no leídas + conexión ───
HLNotif.buildBell(document.getElementById('notif-slot'));
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) HLNotif.clearUnread(); });
if(!document.hidden) HLNotif.clearUnread();
window.addEventListener('online', ()=>{ document.getElementById('offline-dot').classList.remove('show'); refreshNews(false); });
window.addEventListener('offline', ()=>{ document.getElementById('offline-dot').classList.add('show'); });

// ─── INIT: mostramos lo guardado al instante, luego actualizamos ───────────
render();
refreshAssetPanel();
if(items.length) document.getElementById('loading-state').style.display='none';
(async function initHLAssets(){
  await loadHLAssets(); // trae el universo completo de activos de Hyperliquid
  refreshAssetPanel(document.getElementById('asset-search').value); // por si ya había panel abierto
})();
refreshNews(false);
setInterval(()=>refreshNews(false), 3*60*1000);
</script>
</body>
</html>
